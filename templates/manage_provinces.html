{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Manage Provinces</h2>
    <a href="{{ url_for('add_province') }}" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> Add Province
    </a>
</div>

<div class="card">
    <div class="card-body">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for p in provinces %}
                <tr>
                    <td>{{ p.name }}</td>
                    <td>
                        <a href="{{ url_for('edit_province', id=p.id) }}" class="btn btn-sm btn-info">
                            <i class="bi bi-pencil"></i> Edit
                        </a>
                        <form method="POST" action="{{ url_for('delete_province', id=p.id) }}" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete province? This will not delete associated districts, but they will lose province association.')">
                                <i class="bi bi-trash"></i> Delete
                            </button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="2" class="text-center">No provinces found</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
